<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ruta Granel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #f5a623;
    --accent2: #e8530a;
    --text: #eef0f7;
    --text2: #8b90a7;
    --green: #2ecc71;
    --red: #e74c3c;
    --border: rgba(255,255,255,0.07);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  .header {
    background: linear-gradient(135deg, #1a1d27, #0f1117);
    padding: 20px 20px 0;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .total-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 13px; color: var(--text2); }
  .total-badge span { color: var(--accent); font-weight: 600; }
  .sync-indicator { font-size: 11px; color: var(--green); display: none; }
  .sync-indicator.show { display: inline; }

  .tabs { display: flex; gap: 4px; }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { padding: 20px; }
  .screen { display: none; }
  .screen.active { display: block; }

  .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .search-box input { background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; width: 100%; }
  .search-box input::placeholder { color: var(--text2); }

  .client-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .client-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(var(--accent), var(--accent2)); }
  .client-card:hover { border-color: rgba(245,166,35,0.3); transform: translateY(-1px); }
  .client-card.has-geo::before { background: linear-gradient(var(--green), #27ae60); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .client-code { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--accent); }
  .geo-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 500; }
  .geo-badge.ok { background: rgba(46,204,113,0.15); color: var(--green); }
  .geo-badge.missing { background: rgba(231,76,60,0.15); color: var(--red); }
  .dist-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; background: rgba(245,166,35,0.15); color: var(--accent); }
  .client-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .client-address { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .card-footer { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { font-size: 11px; padding: 3px 8px; border-radius: 8px; background: var(--surface2); color: var(--text2); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(245,166,35,0.4); transition: all 0.2s; display: flex; align-items: center; justify-content: center; z-index: 200; }
  .fab:hover { transform: scale(1.1); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: flex-end; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; margin-bottom: 20px; color: var(--accent); }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 6px; display: block; letter-spacing: 0.5px; text-transform: uppercase; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .scan-area { background: var(--bg); border: 2px dashed var(--border); border-radius: var(--radius); padding: 30px 20px; text-align: center; margin-bottom: 20px; cursor: pointer; transition: all 0.2s; }
  .scan-area:hover { border-color: var(--accent); }
  .scan-icon { font-size: 36px; margin-bottom: 10px; }
  .scan-text { font-size: 14px; color: var(--text2); }
  .scan-text strong { color: var(--accent); }
  #scan-file-input { display: none; }
  .img-preview { width: 100%; border-radius: 10px; margin-bottom: 12px; display: none; }
  .loading-bar { height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; margin-bottom: 12px; display: none; animation: pulse 1s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .loading-text { font-size: 13px; color: var(--text2); text-align: center; display: none; margin-bottom: 10px; }

  .btn { width: 100%; padding: 14px; border-radius: var(--radius); border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost { background: none; color: var(--text2); }
  .btn-danger { background: rgba(231,76,60,0.15); color: var(--red); border: 1px solid rgba(231,76,60,0.2); }
  .btn-geo { background: rgba(46,204,113,0.1); color: var(--green); border: 1px solid rgba(46,204,113,0.2); }

  .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .back-btn { background: var(--surface2); border: none; color: var(--text); width: 48px; height: 48px; border-radius: 12px; cursor: pointer; font-size: 32px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .detail-code { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); letter-spacing: 1px; }
  .detail-section { background: var(--surface2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .detail-section-title { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; font-weight: 600; }
  .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .detail-label { font-size: 13px; color: var(--text2); }
  .detail-value { font-size: 13px; font-weight: 500; text-align: right; max-width: 60%; }

  .ruta-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .ruta-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); margin-bottom: 8px; }
  .ruta-subtitle { font-size: 13px; color: var(--text2); }
  .ruta-client-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  .ruta-num { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .ruta-info { flex: 1; }
  .ruta-name { font-weight: 600; font-size: 14px; }
  .ruta-addr { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .ruta-nav-btn { background: var(--surface2); border: none; color: var(--accent); padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 18px; }
  .ruta-no-geo { font-size: 11px; color: var(--red); margin-top: 3px; }
  .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
  .checkbox-item input { width: 18px; height: 18px; accent-color: var(--accent); }
  .checkbox-label { font-size: 14px; }
  .checkbox-label small { display: block; color: var(--text2); font-size: 12px; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 10px 20px; font-size: 14px; z-index: 999; display: none; white-space: nowrap; }
  .toast.show { display: block; animation: fadeInOut 3s forwards; }
  @keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }

  .loading-screen { text-align: center; padding: 80px 20px; color: var(--text2); }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;flex-direction:column;align-items:center;justify-content:center;padding:32px">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:52px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">RUTA GRANEL</div>
  <div style="font-size:13px;color:var(--text2);margin-bottom:40px">Selecciona tu perfil</div>

  <div style="width:100%;max-width:340px">
    <!-- CHOFER - grande y principal -->
    <div style="background:var(--surface);border:1px solid rgba(245,166,35,0.3);border-radius:16px;padding:28px;margin-bottom:24px;text-align:center">
      <div style="font-size:48px;margin-bottom:8px">🚚</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);margin-bottom:4px">Chofer o Ayudante</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:20px">Acceso directo sin contraseña</div>
      <button onclick="loginChofer()" class="btn btn-primary" style="margin-bottom:0;font-size:16px">Entrar</button>
    </div>

    <!-- ADMIN - pequeño y discreto -->
    <div style="border-top:1px solid var(--border);padding-top:16px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px;text-align:center">Acceso Administrador</div>
      <div style="display:flex;gap:8px">
        <input type="password" id="admin-pass" class="form-input" placeholder="Contraseña" style="font-size:12px;padding:8px 10px" onkeydown="if(event.key==='Enter')loginAdmin()">
        <button onclick="loginAdmin()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:12px;white-space:nowrap">Entrar</button>
      </div>
    </div>
  </div>
</div>

<!-- APP CONTAINER -->
<div id="app-container" style="display:none">
<div class="header">
  <div class="header-top">
    <div class="logo">Ruta Granel</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="sync-indicator" id="sync-indicator">● En línea</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="role-badge" style="font-size:11px;padding:3px 10px;border-radius:10px;background:var(--surface2);color:var(--text2)"></span>
        <div class="total-badge">Clientes: <span id="total-count">0</span></div>
        <button onclick="logout()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px" title="Cerrar sesión">⏻</button>
      </div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('clientes')">📋 Clientes</div>
    <div class="tab" onclick="showTab('ruta')">🗺️ Ruta</div>
  </div>
</div>

<div class="content">
  <div id="screen-clientes" class="screen active">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="Buscar por código o nombre..." id="search-input" oninput="renderClients()">
    </div>
    <div id="clients-list">
      <div class="loading-screen"><div class="spinner"></div><p>Cargando clientes...</p></div>
    </div>
  </div>

  <div id="screen-ruta" class="screen">
    <div class="ruta-header">
      <div class="ruta-title">Planificar Ruta</div>
      <div class="ruta-subtitle">Selecciona los clientes del día y genera tu ruta optimizada</div>
    </div>
    <div id="ruta-selector"></div>
    <button class="btn btn-primary" onclick="generateRoute()" id="gen-route-btn" style="display:none">🗺️ Generar Ruta en Google Maps</button>
    <div id="ruta-result"></div>
  </div>

  <div id="screen-detail" class="screen">
    <div class="detail-header">
      <button class="back-btn" onclick="backToList()">←</button>
      <div>
        <div class="detail-code" id="detail-code"></div>
        <div style="font-size:13px;color:var(--text2)" id="detail-name"></div>
      </div>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

</div><!-- end app-container -->
<button class="fab" onclick="openAddModal()" id="fab-btn">+</button>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo Cliente</div>
    <div class="divider"></div>
    <div class="form-group"><label class="form-label">Código *</label><input class="form-input" id="f-code" placeholder="10818320"></div>
    <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="f-name" placeholder="Nombre completo"></div>
    <div class="form-group"><label class="form-label">Dirección</label><input class="form-input" id="f-address" placeholder="Panamericana Norte KM 260"></div>
    <div class="form-group"><label class="form-label">Comuna</label><input class="form-input" id="f-comuna" placeholder="Canela"></div>
    <div class="form-group"><label class="form-label">Medidor</label><input class="form-input" id="f-medidor" placeholder="Nro. medidor"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Teléfono</label><input class="form-input" id="f-phone" placeholder="957587115"></div>
      <div class="form-group"><label class="form-label">Contacto</label><input class="form-input" id="f-contact" placeholder="José Luis"></div>
    </div>
    <div class="form-group"><label class="form-label">Observaciones / Horario</label><input class="form-input" id="f-notes" placeholder="Ej: Solo recibe hasta las 12:00"></div>
    <div class="form-group">
      <label class="form-label">📍 Ubicación GPS</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">LATITUD</label>
          <input class="form-input" id="f-lat" placeholder="-33.456789" style="font-size:13px;padding:8px 10px">
        </div>
        <div>
          <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">LONGITUD</label>
          <input class="form-input" id="f-lng" placeholder="-70.654321" style="font-size:13px;padding:8px 10px">
        </div>
      </div>
      <button type="button" onclick="captureGeoForm()" style="width:100%;padding:10px;background:rgba(46,204,113,0.1);color:var(--green);border:1px solid rgba(46,204,113,0.2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer">📍 Usar mi ubicación actual</button>
    </div>
    <button class="btn btn-primary" id="modal-save-btn" onclick="saveClient()">☁️ Guardar en la nube</button>
    <button class="btn btn-ghost" onclick="closeAddModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCs_AiWLY0U6yGr-7chAL8VLkzHViqu1GM",
    authDomain: "granelconductores-16867.firebaseapp.com",
    projectId: "granelconductores-16867",
    storageBucket: "granelconductores-16867.firebasestorage.app",
    messagingSenderId: "887650733053",
    appId: "1:887650733053:web:2cf4391f2397e511026794",
    measurementId: "G-KC2RZBRZBN"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const clientsCol = collection(db, 'clientes');

  // State
  window._clients = [];
  window._db = db;
  window._clientsCol = clientsCol;
  window._updateDoc = updateDoc;
  window._deleteDoc = deleteDoc;
  window._doc = doc;
  window._addDoc = addDoc;

  // Real-time listener
  onSnapshot(clientsCol, (snapshot) => {
    window._clients = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('total-count').textContent = window._clients.length;
    document.getElementById('sync-indicator').classList.add('show');
    if (window._currentTab === 'clientes') renderClients();
    if (window._currentTab === 'ruta') renderRutaSelector();
  }, (error) => {
    console.error(error);
    showToast('⚠️ Error de conexión');
  });
</script>

<script>
  // AUTH
  const ADMIN_PASS = 'Granel2025*';
  window._isAdmin = false;

  function checkAuth() {
    const role = sessionStorage.getItem('rg_role');
    if (role === 'admin') { window._isAdmin = true; showApp(); }
    else if (role === 'chofer') { window._isAdmin = false; showApp(); }
    else showLoginScreen();
  }

  function showLoginScreen() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-container').style.display = 'none';
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'block';
    const badge = document.getElementById('role-badge');
    if (badge) badge.textContent = window._isAdmin ? '👑 Admin' : '👤 Chofer o Ayudante';
    document.getElementById('fab-btn').style.display = 'flex';
    startLocationTracking();
    window._currentTab = 'clientes';
    renderClients();
  }

  function loginAdmin() {
    const pass = document.getElementById('admin-pass').value;
    if (pass === ADMIN_PASS) {
      sessionStorage.setItem('rg_role', 'admin');
      window._isAdmin = true;
      showApp();
    } else {
      showToast('❌ Contraseña incorrecta');
    }
  }

  function loginChofer() {
    sessionStorage.setItem('rg_role', 'chofer');
    window._isAdmin = false;
    showApp();
  }

  function logout() {
    sessionStorage.removeItem('rg_role');
    window._isAdmin = false;
    showLoginScreen();
  }

  window._currentTab = 'clientes';
  checkAuth();
  let currentDetailId = null;

  function showTab(tab) {
    window._currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i===0&&tab==='clientes')||(i===1&&tab==='ruta'));
    });
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-'+tab).classList.add('active');
    document.getElementById('fab-btn').style.display = tab==='clientes'?'flex':'none';
    if (tab==='ruta') renderRutaSelector();
  }

  function renderClients() {
    const clients = window._clients || [];
    const q = (document.getElementById('search-input').value||'').toLowerCase();
    const filtered = clients.filter(c =>
      (c.code||'').toLowerCase().includes(q) ||
      (c.name||'').toLowerCase().includes(q) ||
      (c.address||'').toLowerCase().includes(q) ||
      (c.comuna||'').toLowerCase().includes(q) ||
      (c.medidor||'').toLowerCase().includes(q)
    );
    const list = document.getElementById('clients-list');
    if (clients.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🚚</div><h3>Sin clientes aún</h3><p>Toca el <strong style="color:var(--accent)">+</strong> para agregar tu primer cliente.</p></div>`;
      return;
    }
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>Sin resultados</h3></div>`;
      return;
    }

  async function captureGeo(id) {
    if (!navigator.geolocation) { showToast('❌ GPS no disponible'); return; }
    showToast('📡 Obteniendo ubicación...');
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const ref = window._doc(window._db, 'clientes', id);
        await window._updateDoc(ref, { lat: pos.coords.latitude, lng: pos.coords.longitude });
        showToast('✅ Ubicación guardada en la nube');
        showDetail(id);
      } catch(e) { showToast('❌ Error al guardar'); }
    }, () => showToast('❌ No se pudo obtener GPS'));
  }

  async function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      document.getElementById('img-preview').src = e.target.result;
      document.getElementById('img-preview').style.display = 'block';
      document.getElementById('scan-area').style.display = 'none';
      document.getElementById('loading-bar').style.display = 'block';
      document.getElementById('loading-text').style.display = 'block';
      document.getElementById('loading-text').textContent = '🤖 Analizando documento...';
      const base64 = e.target.result.split(',')[1];
      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 4000,
            messages: [{ role: "user", content: [
              { type: "image", source: { type: "base64", media_type: file.type, data: base64 } },
              { type: "text", text: `Analiza este documento que puede contener UNO O VARIOS clientes. Extrae TODOS los clientes que encuentres y devuelve SOLO un array JSON puro (sin backticks ni texto extra) con este formato:
[{"code":"código cliente","rut":"rut cliente","name":"nombre cliente","address":"dirección","comuna":"comuna","phone":"teléfono principal","contact":"nombre de contacto","notes":"observaciones relevantes como horario, tipo de pago, medio de pago"}]
Si un campo no existe deja el valor como string vacío "". Devuelve siempre un array aunque sea de un solo elemento.` }
            ]}]
          })
        });
        const data = await response.json();
        const text = data.content?.map(i=>i.text||'').join('')||'';
        // Try to extract JSON array from response
        let parsed;
        try {
          const clean = text.replace(/```json|```/g,'').trim();
          // Find JSON array in response
          const match = clean.match(/\[[\s\S]*\]/);
          parsed = match ? JSON.parse(match[0]) : JSON.parse(clean);
        } catch(jsonErr) {
          // If still fails, try to find any JSON object
          const objMatch = text.match(/\{[\s\S]*\}/);
          parsed = objMatch ? [JSON.parse(objMatch[0])] : null;
          if (!parsed) throw new Error('No se pudo extraer datos del documento');
        }
        const clients = Array.isArray(parsed) ? parsed : [parsed];

        // Show preview of scanned clients
        const preview = document.getElementById('scanned-clients-preview');
        preview.style.display = 'block';
        preview.innerHTML = `
          <p style="font-size:13px;color:var(--text2);margin-bottom:10px">✅ Se encontraron <strong style="color:var(--accent)">${clients.length} cliente(s)</strong>. Revisa y confirma:</p>
          ${clients.map((c,i) => `
            <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent)">${c.code||'Sin código'}</span>
                <input type="checkbox" id="sc-check-${i}" checked style="width:18px;height:18px;accent-color:var(--accent)">
              </div>
              <div style="font-size:13px;font-weight:600;margin-bottom:2px">${c.name||''}</div>
              <div style="font-size:12px;color:var(--text2)">${c.address||''}${c.comuna?', '+c.comuna:''}</div>
              ${c.phone?`<div style="font-size:12px;color:var(--text2)">📞 ${c.phone}</div>`:''}
              ${c.notes?`<div style="font-size:11px;color:var(--accent);margin-top:3px">📝 ${c.notes}</div>`:''}
            </div>
          `).join('')}
          <button class="btn btn-primary" onclick="saveScannedClients(${JSON.stringify(clients).replace(/"/g,'&quot;')})">☁️ Guardar todos en la nube</button>
        `;
        showToast(`✅ ${clients.length} cliente(s) detectados`);
      } catch(e) {
        showToast('⚠️ Error: ' + (e.message||String(e))); console.error('API Error:', e);
        document.getElementById('scan-area').style.display='block';
      }
      document.getElementById('loading-bar').style.display='none';
      document.getElementById('loading-text').style.display='none';
    };
    reader.readAsDataURL(file);
  }

  async function saveScannedClients(clientsJson) {
    const clients = typeof clientsJson === 'string' ? JSON.parse(clientsJson) : clientsJson;
    let saved = 0, skipped = 0;
    for (let i = 0; i < clients.length; i++) {
      const checkbox = document.getElementById(`sc-check-${i}`);
      if (checkbox && !checkbox.checked) { skipped++; continue; }
      const c = clients[i];
      if (!c.code || !c.name) { skipped++; continue; }
      const exists = (window._clients||[]).find(x=>x.code===c.code);
      if (exists) { skipped++; continue; }
      try {
        await window._addDoc(window._clientsCol, {
          code: c.code, name: c.name,
          rut: c.rut||'', address: c.address||'',
          comuna: c.comuna||'', phone: c.phone||'',
          contact: c.contact||'', notes: c.notes||'',
          lat: null, lng: null,
          createdAt: new Date().toISOString()
        });
        saved++;
      } catch(e) { skipped++; }
    }
    closeAddModal();
    showToast(`✅ ${saved} guardado(s)${skipped>0?' · '+skipped+' omitido(s)':''}`);
  }

  async function saveClient() {
    const code = document.getElementById('f-code').value.trim();
    const name = document.getElementById('f-name').value.trim();
    if (!code||!name) { showToast('⚠️ Código y nombre son obligatorios'); return; }
    const exists = (window._clients||[]).find(c=>c.code===code);
    if (exists) { showToast('⚠️ Ya existe ese código'); return; }
    // Note: editing uses updateClient() not saveClient()
    try {
      await window._addDoc(window._clientsCol, {
        code, name,
        medidor: document.getElementById('f-medidor').value.trim(),
        address: document.getElementById('f-address').value.trim(),
        comuna: document.getElementById('f-comuna').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        contact: document.getElementById('f-contact').value.trim(),
        notes: document.getElementById('f-notes').value.trim(),
        lat: parseFloat(document.getElementById('f-lat').value)||null,
        lng: parseFloat(document.getElementById('f-lng').value)||null,
        createdAt: new Date().toISOString()
      });
      closeAddModal();
      showToast('✅ Cliente guardado en la nube');
    } catch(e) { showToast('❌ Error al guardar: '+e.message); }
  }

    const filtered = clients.filter(c =>
      !window._selectedRouteIds.has(c.id) &&
      (
        (c.code||'').toLowerCase().includes(q) ||
        (c.name||'').toLowerCase().includes(q) ||
        (c.address||'').toLowerCase().includes(q) ||
        (c.comuna||'').toLowerCase().includes(q) ||
        (c.medidor||'').toLowerCase().includes(q)
      )
    ).slice(0, 8);

  function updateRouteBtn() {
    const count = (window._selectedRouteIds||new Set()).size;
    document.getElementById('gen-route-btn').style.display = count>=2?'block':'none';
  }

  function generateRoute() {
    const selected = Array.from(window._selectedRouteIds||new Set()).map(id=>(window._clients||[]).find(c=>c.id===id)).filter(Boolean);
    const withGeo = selected.filter(c=>c.lat);
    let mapsUrl='';
    if (withGeo.length>=2) {
      // Use Google Maps directions API format with waypoints parameter
      const origin = `${withGeo[0].lat},${withGeo[0].lng}`;
      const dest = `${withGeo[withGeo.length-1].lat},${withGeo[withGeo.length-1].lng}`;
      const waypoints = withGeo.slice(1,-1).map(c=>`${c.lat},${c.lng}`).join('|');
      mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}${waypoints?'&waypoints='+encodeURIComponent(waypoints):''}&travelmode=driving`;
    } else if (withGeo.length===1) {
      mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${withGeo[0].lat},${withGeo[0].lng}&travelmode=driving`;
    }
    document.getElementById('ruta-result').innerHTML=`
      <div class="divider"></div>
      <div class="ruta-header"><div class="ruta-title">Ruta del Día</div><div class="ruta-subtitle">${selected.length} cliente(s)</div></div>
      ${selected.map((c,i)=>`
        <div class="ruta-client-item">
          <div class="ruta-num">${i+1}</div>
          <div class="ruta-info">
            <div class="ruta-name">${c.code} — ${c.name}</div>
            <div class="ruta-addr">${c.address||''}${c.comuna?', '+c.comuna:''}</div>
            ${c.notes?`<div style="font-size:11px;color:var(--accent);margin-top:2px">📝 ${c.notes}</div>`:''}
            ${!c.lat?`<div class="ruta-no-geo">⚠️ Sin GPS</div>`:''}
          </div>
          ${c.lat
            ?`<button class="ruta-nav-btn" onclick="navigateTo(${c.lat},${c.lng})">▶</button>`
            :`<button class="ruta-nav-btn" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((c.address||'')+' '+(c.comuna||''))}','_blank')">▶</button>`
          }
        </div>
      `).join('')}
      ${mapsUrl?`<button class="btn btn-primary" style="margin-top:8px" onclick="window.open('${mapsUrl}','_blank')">🗺️ Abrir ruta completa en Maps</button>`:''}
    `;
  }

  async function saveManualGeo(id) {
    const lat = parseFloat(document.getElementById('manual-lat').value.trim());
    const lng = parseFloat(document.getElementById('manual-lng').value.trim());
    if (isNaN(lat) || isNaN(lng)) { showToast('⚠️ Ingresa coordenadas válidas'); return; }
    if (lat < -90 || lat > 90 || lng < -180 || lng > 180) { showToast('⚠️ Coordenadas fuera de rango'); return; }
    try {
      const ref = window._doc(window._db, 'clientes', id);
      await window._updateDoc(ref, { lat, lng });
      showToast('✅ Coordenadas guardadas');
      showDetail(id);
    } catch(e) { showToast('❌ Error al guardar'); }
  }

  async function updateClient(id) {
    const code = document.getElementById('f-code').value.trim();
    const name = document.getElementById('f-name').value.trim();
    if (!code||!name) { showToast('⚠️ Código y nombre son obligatorios'); return; }
    try {
      const ref = window._doc(window._db, 'clientes', id);
      await window._updateDoc(ref, {
        code, name,
        medidor: document.getElementById('f-medidor').value.trim(),
        address: document.getElementById('f-address').value.trim(),
        comuna: document.getElementById('f-comuna').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        contact: document.getElementById('f-contact').value.trim(),
        notes: document.getElementById('f-notes').value.trim(),
      });
      closeAddModal();
      showToast('✅ Cliente actualizado');
      showDetail(id);
    } catch(e) { showToast('❌ Error al actualizar: '+e.message); }
  }

  // Calculate distance between two coordinates in km
  function calcDistance(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLng = (lng2-lng1) * Math.PI/180;
    const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
              Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
              Math.sin(dLng/2)*Math.sin(dLng/2);
    const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    return R*c;
  }

  function formatDistance(km) {
    if (km < 1) return Math.round(km*1000) + ' m';
    return km.toFixed(1) + ' km';
  }

  // Get user location and update distances
  window._userLat = null;
  window._userLng = null;

  function startLocationTracking() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(pos => {
      window._userLat = pos.coords.latitude;
      window._userLng = pos.coords.longitude;
      if (window._currentTab === 'clientes') renderClients();
    }, null, { enableHighAccuracy: true, maximumAge: 30000 });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent=msg; t.className='toast show';
    setTimeout(()=>t.className='toast',3000);
  }
</script>
